                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </lightning-tab>

            </lightning-tabset>
        </lightning-tab>

        <!-- TAB 3: HARDWARE MANAGEMENT -->
        <lightning-tab label="Office Hardware Management" value="hardware" icon-name="standard:case">
            <div class="slds-p-around_medium bg-white">
                <div class="slds-grid slds-grid_align-spread slds-m-bottom_medium">
                    <h2 class="slds-text-heading_medium"><strong>Hardware Operations</strong></h2>
                    <lightning-button label="New Hardware Request" variant="brand" onclick={openHRHwRequestModal} icon-name="utility:add"></lightning-button>
                </div>
                <lightning-tabset variant="scoped">
                    
                    <!-- INNER TAB A: Escalated Requests -->
                    <lightning-tab label="Escalated Requests">
                        <div class="section-container slds-m-top_medium">
                            <div class="section-header">
                                <h2 class="section-title">Hardware Requests Pending HR Approval</h2>
                                <lightning-button-icon icon-name="utility:refresh" alternative-text="Refresh" onclick={loadEscalatedRequests}></lightning-button-icon>
                            </div>
                            
                            <template if:false={hasEscalatedRequests}>
                                <div class="slds-text-align_center slds-p-around_medium slds-text-color_weak">
                                    No hardware requests pending your approval.
                                </div>
                            </template>
                            <template if:true={hasEscalatedRequests}>
                                <div class="slds-grid slds-wrap slds-gutters">
                                    <template for:each={escalatedRequests} for:item="req">
                                        <div key={req.Id} class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3 slds-m-bottom_medium">
                                            <div class="slds-box slds-box_x-small" style="background:#f4f6f9; border-radius:8px;">
                                                <div class="slds-grid slds-grid_align-spread">
                                                    <strong>{req.Hardware_Type__c}</strong>
                                                    <span class="slds-badge slds-theme_warning">{req.Status__c}</span>
                                                </div>
                                                <div class="slds-m-top_small">
                                                    <p><strong>Employee:</strong> {req.employeeName}</p>
                                                    <template if:true={req.employeeDepartment}>
                                                        <p><strong>Department:</strong> {req.employeeDepartment}</p>
                                                    </template>
                                                    <template if:true={req.employeePosition}>
                                                        <p><strong>Position:</strong> {req.employeePosition}</p>
                                                    </template>
                                                    <p><strong>Date:</strong> <lightning-formatted-date-time value={req.CreatedDate} year="numeric" month="short" day="2-digit"></lightning-formatted-date-time></p>
                                                    <template if:true={req.Admin_Comment__c}>
                                                        <p><strong>Admin Comment:</strong> {req.Admin_Comment__c}</p>
                                                    </template>
                                                    <p class="slds-m-top_x-small"><strong>Description:</strong><br/>{req.Description__c}</p>
                                                </div>
                                                <div class="slds-m-top_medium slds-grid slds-grid_align-end slds-gutters_x-small">
                                                    <div class="slds-col">
                                                        <lightning-button label="Reject" variant="destructive-text" onclick={openRequestModal} data-id={req.Id} data-action="Reject"></lightning-button>
                                                    </div>
                                                    <div class="slds-col">
                                                        <lightning-button label="Approve" variant="brand" onclick={openRequestModal} data-id={req.Id} data-action="Approve"></lightning-button>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </lightning-tab>

                    <!-- INNER TAB B: Escalated Tickets -->
                    <lightning-tab label="Escalated Tickets">
                        <div class="section-container slds-m-top_medium">
                            <div class="section-header">
                                <h2 class="section-title">Hardware Tickets Escalated to HR</h2>
                                <lightning-button-icon icon-name="utility:refresh" alternative-text="Refresh" onclick={loadEscalatedTickets}></lightning-button-icon>
                            </div>
                            
                            <template if:false={hasEscalatedTickets}>
                                <div class="slds-text-align_center slds-p-around_medium slds-text-color_weak">
                                    No hardware tickets escalated to you.
                                </div>
                            </template>
                            <template if:true={hasEscalatedTickets}>
                                <div class="slds-grid slds-wrap slds-gutters">
                                    <template for:each={escalatedTickets} for:item="ticket">
                                        <div key={ticket.Id} class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3 slds-m-bottom_medium">
                                            <div class="slds-box slds-box_x-small" style="background:#f4f6f9; border-radius:8px;">
                                                <div class="slds-grid slds-grid_align-spread">
                                                    <strong>{ticket.Name} - {ticket.hardwareName}</strong>
                                                    <div>
                                                        <template if:true={ticket.isResolvedByAdmin}>
                                                            <span class="slds-badge slds-theme_success slds-m-right_xx-small">Resolved by {ticket.adminName}</span>
                                                        </template>
                                                        <span class="slds-badge slds-theme_warning">{ticket.Status__c}</span>
                                                    </div>
                                                </div>
                                                <div class="slds-m-top_small">
                                                     <p><strong>Employee:</strong> {ticket.employeeName}</p>
                                                     <p><strong>Date:</strong> <lightning-formatted-date-time value={ticket.CreatedDate} year="numeric" month="short" day="2-digit"></lightning-formatted-date-time></p>
                                                     <p class="slds-m-top_x-small"><strong>Notes / Details:</strong><br/>{ticket.Notes__c}</p>
                                                 </div>
                                                <div class="slds-m-top_medium slds-grid slds-grid_align-end slds-gutters_x-small">
                                                    <template if:false={ticket.isResolvedByAdmin}>
                                                        <div class="slds-col">
                                                            <lightning-button label="Resolve & Close" variant="brand" onclick={openTicketModal} data-id={ticket.Id} data-action="Resolve"></lightning-button>
                                                        </div>
                                                    </template>
                                                </div>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </lightning-tab>

                    <!-- INNER TAB: Solved Requests & Tickets -->
                    <lightning-tab label="Solved Requests & Tickets">
                        <div class="section-container slds-m-top_medium">
                            <!-- Solved Requests Section -->
                            <div class="slds-m-bottom_large">
                                <h2 class="section-title slds-m-bottom_medium">Solved Requests</h2>
                                <template if:false={hasSolvedRequests}>
                                    <div class="slds-text-align_center slds-p-around_medium slds-text-color_weak" style="border: 1px dashed #ccc; border-radius: 8px;">
                                        No solved hardware requests.
                                    </div>
                                </template>
                                <template if:true={hasSolvedRequests}>
                                    <div class="slds-grid slds-wrap slds-gutters">
                                        <template for:each={solvedRequests} for:item="req">
                                            <div key={req.Id} class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3 slds-m-bottom_medium">
                                                <div class="slds-box slds-box_x-small" style="background:#f4f6f9; border-radius:8px; border-left: 4px solid #10b981;">
                                                    <div class="slds-grid slds-grid_align-spread">
                                                        <strong>{req.Hardware_Type__c}</strong>
                                                        <span class="slds-badge slds-theme_success">{req.Status__c}</span>
                                                    </div>
                                                    <div class="slds-m-top_small">
                                                         <p><strong>Employee:</strong> {req.employeeName}</p>
                                                         <p><strong>Date:</strong> {req.formattedDate}</p>
                                                        <template if:true={req.Admin_Comment__c}>
                                                            <p><strong>Admin Comment:</strong> {req.Admin_Comment__c}</p>
                                                        </template>
                                                        <template if:true={req.HR_Manager_Comment__c}>
                                                            <p><strong>HR/Manager Comment:</strong> {req.HR_Manager_Comment__c}</p>
                                                        </template>
                                                        <p class="slds-m-top_x-small"><strong>Description:</strong><br/>{req.Description__c}</p>
                                                    </div>
                                                    <template if:true={req.isDeliverable}>
                                                        <div class="slds-m-top_medium slds-grid slds-grid_align-end">
                                                            <lightning-button label="Deliver" variant="brand" onclick={handleDeliverRequest} data-id={req.Id}></lightning-button>
                                                        </div>
                                                    </template>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                            </div>

                            <!-- Solved Tickets Section -->
                            <div>
                                <h2 class="section-title slds-m-bottom_medium">Solved Tickets</h2>
                                <template if:false={hasSolvedTickets}>
                                    <div class="slds-text-align_center slds-p-around_medium slds-text-color_weak" style="border: 1px dashed #ccc; border-radius: 8px;">
                                        No solved hardware tickets.
                                    </div>
                                </template>
                                <template if:true={hasSolvedTickets}>
                                    <div class="slds-grid slds-wrap slds-gutters">
                                        <template for:each={solvedTickets} for:item="ticket">
                                            <div key={ticket.Id} class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3 slds-m-bottom_medium">
                                                <div class="slds-box slds-box_x-small" style="background:#f4f6f9; border-radius:8px; border-left: 4px solid #10b981;">
                                                    <div class="slds-grid slds-grid_align-spread">
                                                        <strong>{ticket.Name} - {ticket.hardwareName}</strong>
                                                        <span class="slds-badge slds-theme_success">{ticket.Status__c}</span>
                                                    </div>
                                                    <div class="slds-m-top_small">
                                                        <p><strong>Employee:</strong> {ticket.employeeName}</p>
                                                        <p><strong>Date:</strong> {ticket.formattedDate}</p>
                                                        <p class="slds-m-top_x-small"><strong>Notes / Details:</strong><br/>{ticket.Notes__c}</p>
                                                    </div>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </lightning-tab>

                    <!-- INNER TAB C: Hardware Report -->
                    <lightning-tab label="Hardware Report" value="hardware_report" onactive={loadHardwareReport}>
                        <div class="section-container slds-m-top_medium">
                            <div class="section-header">
                                <h2 class="section-title">Hardware Inventory & Assignments</h2>
                                <div class="slds-grid slds-gutters_small slds-grid_vertical-align-end">
                                    <!-- Search -->
                                    <div class="slds-col">
                                        <lightning-input 
                                           type="search" 
                                           placeholder="Search Name, Serial, User..." 
                                           variant="label-hidden"
                                           onchange={handleHwSearch}
                                           value={hardwareSearchKey}
                                           class="slds-m-bottom_none"
                                           style="width: 220px;">
                                       </lightning-input>
                                    </div>
                                    <!-- Type Filter -->
                                    <div class="slds-col">
                                        <lightning-combobox
                                            name="hwType"
                                            label="Type"
                                            value={selectedHwType}
                                            options={hwTypeOptionsFilter}
                                            onchange={handleHwTypeChange}
                                            variant="label-hidden"
                                            style="width: 140px;"
                                            class="slds-m-bottom_none">
                                        </lightning-combobox>
                                    </div>
                                    <!-- Status Filter -->
                                    <div class="slds-col">
                                        <lightning-combobox
                                            name="hwStatus"
                                            label="Status"
                                            value={selectedHwStatus}
                                            options={hwStatusOptionsFilter}
                                            onchange={handleHwStatusChange}
                                            variant="label-hidden"
                                            style="width: 140px;"
                                            class="slds-m-bottom_none">
                                        </lightning-combobox>
                                    </div>
                                    <!-- View Mode Toggles -->
                                    <div class="slds-col">
                                        <lightning-button-group class="slds-m-bottom_none">
                                            <lightning-button label="All Hardware" variant={hwViewModeAllVariant} onclick={setHwViewModeAll}></lightning-button>
                                            <lightning-button label="User Wise" variant={hwViewModeUserVariant} onclick={setHwViewModeUser}></lightning-button>
                                        </lightning-button-group>
                                    </div>
                                    <!-- Refresh & Export -->
                                    <div class="slds-col slds-p-bottom_xx-small">
                                        <lightning-button-icon icon-name="utility:refresh" variant="border-filled" onclick={loadHardwareReport} alternative-text="Refresh" class="slds-m-right_small"></lightning-button-icon>
                                        <lightning-button label="Export" icon-name="utility:download" variant="brand" onclick={handleDownloadHardware}></lightning-button>
                                    </div>
                                </div>
                            </div>

                            <div if:true={hardwareLoading} class="slds-is-relative slds-p-around_large">
                                <lightning-spinner size="medium"></lightning-spinner>
                            </div>

                            <div if:false={hardwareLoading}>
                                <!-- All Hardware View -->
                                <template if:true={isHwViewModeAll}>
                                    <template if:false={filteredHardware.length}>
                                        <div class="slds-text-align_center slds-p-around_medium slds-text-color_weak">
                                            No hardware records match the selected filters.
                                        </div>
                                    </template>
                                    <template if:true={filteredHardware.length}>
                                        <div class="custom-table-wrapper" style="overflow-x: auto;">
                                            <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_striped">
                                                <thead>
                                                    <tr class="slds-line-height_reset">
                                                        <th scope="col" style="width: 50px;"></th>
                                                        <th scope="col"><div class="slds-truncate">Hardware Name</div></th>
                                                        <th scope="col"><div class="slds-truncate">Type</div></th>
                                                        <th scope="col"><div class="slds-truncate">Serial Number</div></th>
                                                        <th scope="col"><div class="slds-truncate">Status</div></th>
                                                        <th scope="col"><div class="slds-truncate">Location</div></th>
                                                        <th scope="col"><div class="slds-truncate">Life Used</div></th>
                                                        <th scope="col"><div class="slds-truncate">Assigned To</div></th>
                                                        <th scope="col"><div class="slds-truncate">Date Assigned</div></th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    <template for:each={filteredHardware} for:item="hw">
                                                        <tr key={hw.Id}>
                                                            <td>
                                                                <template if:true={hw.Image_URL__c}>
                                                                    <img src={hw.Image_URL__c} style="width: 35px; height: 35px; border-radius: 4px; object-fit: cover;">
                                                                </template>
                                                            </td>
                                                            <td>
                                                                <div class="slds-truncate">
                                                                    <a href="javascript:void(0);" onclick={handleHardwareNameClick} data-id={hw.Id}><strong>{hw.Name}</strong></a>
                                                                </div>
                                                            </td>
                                                            <td><div class="slds-truncate">{hw.Type__c}</div></td>
                                                            <td><div class="slds-truncate">{hw.Serial_Number__c}</div></td>
                                                            <td>
                                                                <span class={hw.statusBadgeClass}>{hw.Status__c}</span>
                                                            </td>
                                                            <td><div class="slds-truncate">{hw.Location__c}</div></td>
                                                            <td>
                                                                <span class={hw.lifeUsedBadgeClass}>{hw.LifeUsed}</span>
                                                            </td>
                                                            <td><div class="slds-truncate">{hw.AssignedToName}</div></td>
                                                            <td>
                                                                <template if:true={hw.Date_Assigned__c}>
                                                                    <lightning-formatted-date-time value={hw.Date_Assigned__c} year="numeric" month="short" day="2-digit" time-zone="UTC"></lightning-formatted-date-time>
                                                                </template>
                                                                <template if:false={hw.Date_Assigned__c}>-</template>
                                                            </td>
                                                        </tr>
                                                    </template>
                                                </tbody>
                                            </table>
                                        </div>
                                    </template>
                                </template>

                                <!-- User Wise View -->
                                <template if:false={isHwViewModeAll}>
                                    <template if:false={filteredUserWise.length}>
                                        <div class="slds-text-align_center slds-p-around_medium slds-text-color_weak">
                                            No user assignments match the selected filters.
                                        </div>
                                    </template>
                                    <template if:true={filteredUserWise.length}>
                                        <div class="custom-table-wrapper" style="overflow-x: auto;">
                                            <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_striped">
                                                <thead>
                                                    <tr class="slds-line-height_reset">
                                                        <th scope="col" style="width: 250px;"><div class="slds-truncate">Employee Name</div></th>
                                                        <th scope="col"><div class="slds-truncate">Assigned Hardware Inventory</div></th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    <template for:each={filteredUserWise} for:item="user">
                                                        <tr key={user.userId}>
                                                            <td><div class="slds-truncate"><strong>{user.userName}</strong></div></td>
                                                            <td>
                                                                <div class="slds-grid slds-wrap slds-gutters_xx-small">
                                                                    <template for:each={user.hardwareList} for:item="hw">
                                                                        <div key={hw.Id} class="slds-col slds-m-vertical_xx-small">
                                                                            <span class="slds-badge slds-theme_light" onclick={handleHardwareNameClick} data-id={hw.Id} style="padding: 0.3rem 0.6rem; border: 1px solid #dcdcdc; border-radius: 4px; display: inline-flex; align-items: center; gap: 6px; cursor: pointer;">
                                                                                <a href="javascript:void(0);" style="text-decoration: none; color: inherit; display: inline-flex; align-items: center; gap: 6px;">
                                                                                    <strong>{hw.Name}</strong> 
                                                                                    <span style="font-size: 0.75rem; color: #555;">({hw.Type__c})</span>
                                                                                    <template if:true={hw.Serial_Number__c}>
                                                                                        <span style="font-size: 0.7rem; color: #888;">S/N: {hw.Serial_Number__c}</span>
                                                                                    </template>
                                                                                </a>
                                                                            </span>
                                                                        </div>
                                                                    </template>
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    </template>
                                                </tbody>
                                            </table>
                                        </div>
                                    </template>
                                </template>
                            </div>
                        </div>
                    </lightning-tab>

                </lightning-tabset>
            </div>
        </lightning-tab>

        <template if:true={currentUser.isTechnicalSystemAdmin}>
            <lightning-tab label="Hardware Administration" icon-name="standard:maintenance_plan">
                <c-hardware-admin-dashboard></c-hardware-admin-dashboard>
            </lightning-tab>
        </template>
    </lightning-tabset>

    <!-- Hardware Action Modals -->
    <template if:true={isHwRequestModalOpen}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <lightning-button-icon class="slds-modal__close" icon-name="utility:close" alternative-text="Close" onclick={closeHwRequestModal} variant="bare-inverse" size="large"></lightning-button-icon>
                    <h2 class="slds-text-heading_medium">{hwRequestActionType} Hardware Request</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-textarea label="HR/Manager Comment (Required)" value={hwComment} onchange={handleHwCommentChange} required></lightning-textarea>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={closeHwRequestModal}></lightning-button>
                    <lightning-button label="Confirm" variant="brand" onclick={submitHwRequestAction} class="slds-m-left_x-small"></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <template if:true={isHwTicketModalOpen}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <lightning-button-icon class="slds-modal__close" icon-name="utility:close" alternative-text="Close" onclick={closeHwTicketModal} variant="bare-inverse" size="large"></lightning-button-icon>
                    <h2 class="slds-text-heading_medium">{hwTicketActionType} Hardware Ticket</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-textarea label="HR/Manager Note (Required)" value={hwTicketNote} onchange={handleHwTicketNoteChange} required></lightning-textarea>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={closeHwTicketModal}></lightning-button>
                    <lightning-button label="Confirm" variant="brand" onclick={submitHwTicketAction} class="slds-m-left_x-small"></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- Approved Leaves Modal -->
    <template if:true={isApprovedModalOpen}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_large">
            <div class="slds-modal__container modal-enhanced">
                <!-- Enhanced Header with Gradient -->
                <div class="modal-header-enhanced">
                    <button class="slds-button slds-button_icon modal-close-btn" onclick={closeApprovedModal}>
                        <lightning-icon icon-name="utility:close" alternative-text="close" size="small" class="close-icon"></lightning-icon>
                    </button>
                    <div class="modal-header-content">
                        <lightning-icon icon-name="action:approval" size="small" class="header-icon"></lightning-icon>
                        <div>
                            <h2 class="modal-title">Approved Leaves</h2>
                            <p class="modal-subtitle">Current Month Summary</p>
                        </div>
                    </div>
                    <!-- Quick Stats Banner -->
                    <div class="stats-banner">
                        <div class="stat-item">
                            <lightning-icon icon-name="utility:people" size="x-small"></lightning-icon>
                            <span class="stat-value">{approvedLeavesList.length}</span>
                            <span class="stat-label">Requests</span>
                        </div>
                        <div class="stat-divider"></div>
                        <div class="stat-item">
                            <lightning-icon icon-name="utility:event" size="x-small"></lightning-icon>
                            <span class="stat-value">{totalApprovedDays}</span>
                            <span class="stat-label">Total Days</span>
                        </div>
                    </div>
                </div>
                
                <!-- Enhanced Content -->
                <div class="slds-modal__content modal-content-enhanced">
                    <template if:true={approvedLeavesList.length}>
                        <div class="table-wrapper-enhanced">
                            <lightning-datatable 
                                key-field="Id" 
                                data={approvedLeavesList} 
                                columns={reportColumns}
                                hide-checkbox-column
                                class="enhanced-table">
                            </lightning-datatable>
                        </div>
                    </template>
                    <template if:false={approvedLeavesList.length}>
                        <div class="empty-state-enhanced">
                            <lightning-icon icon-name="custom:custom14" size="large"></lightning-icon>
                            <h3>No Approved Leaves</h3>
                            <p>There are no approved leave requests for this month yet.</p>
                        </div>
                    </template>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- Cancelled Leaves Modal -->
    <template if:true={isCancelledModalOpen}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_large">
            <div class="slds-modal__container modal-enhanced">
                <!-- Enhanced Header with Red Gradient -->
                <div class="modal-header-enhanced modal-header-cancelled">
                    <button class="slds-button slds-button_icon modal-close-btn" onclick={closeCancelledModal}>
                        <lightning-icon icon-name="utility:close" alternative-text="close" size="small" class="close-icon"></lightning-icon>
                    </button>
                    <div class="modal-header-content">
                        <lightning-icon icon-name="action:close" size="small" class="header-icon"></lightning-icon>
                        <div>
                            <h2 class="modal-title">Cancelled Leaves</h2>
                            <p class="modal-subtitle">Current Month Summary</p>
                        </div>
                    </div>
                    <!-- Quick Stats Banner -->
                    <div class="stats-banner">
                        <div class="stat-item">
                            <lightning-icon icon-name="utility:people" size="x-small"></lightning-icon>
                            <span class="stat-value">{cancelledLeavesList.length}</span>
                            <span class="stat-label">Requests</span>
                        </div>
                        <div class="stat-divider"></div>
                        <div class="stat-item">
                            <lightning-icon icon-name="utility:event" size="x-small"></lightning-icon>
                            <span class="stat-value">{totalCancelledDays}</span>
                            <span class="stat-label">Total Days</span>
                        </div>
                    </div>
                </div>
                
                <!-- Enhanced Content -->
                <div class="slds-modal__content modal-content-enhanced">
                    <template if:true={cancelledLeavesList.length}>
                        <div class="table-wrapper-enhanced">
                            <lightning-datatable 
                                key-field="Id" 
                                data={cancelledLeavesList} 
                                columns={reportColumns}
                                hide-checkbox-column
                                class="enhanced-table">
                            </lightning-datatable>
                        </div>
                    </template>
                    <template if:false={cancelledLeavesList.length}>
                        <div class="empty-state-enhanced">
                            <lightning-icon icon-name="custom:custom14" size="large"></lightning-icon>
                            <h3>No Cancelled Leaves</h3>
                            <p>There are no cancelled leave requests for this month.</p>
                        </div>
                    </template>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- Rejected Leaves Modal -->
    <template if:true={isRejectedModalOpen}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_large">
            <div class="slds-modal__container modal-enhanced">
                <!-- Enhanced Header with Purple Gradient -->
                <div class="modal-header-enhanced modal-header-rejected">
                    <button class="slds-button slds-button_icon modal-close-btn" onclick={closeRejectedModal}>
                        <lightning-icon icon-name="utility:close" alternative-text="close" size="small" class="close-icon"></lightning-icon>
                    </button>
                    <div class="modal-header-content">
                        <lightning-icon icon-name="action:reject" size="small" class="header-icon"></lightning-icon>
                        <div>
                            <h2 class="modal-title">Rejected Leaves</h2>
                            <p class="modal-subtitle">Current Month Summary</p>
                        </div>
                    </div>
                    <!-- Quick Stats Banner -->
                    <div class="stats-banner">
                        <div class="stat-item">
                            <lightning-icon icon-name="utility:people" size="x-small"></lightning-icon>
                            <span class="stat-value">{rejectedLeavesList.length}</span>
                            <span class="stat-label">Requests</span>
                        </div>
                        <div class="stat-divider"></div>
                        <div class="stat-item">
                            <lightning-icon icon-name="utility:event" size="x-small"></lightning-icon>
                            <span class="stat-value">{totalRejectedDays}</span>
                            <span class="stat-label">Total Days</span>
                        </div>
                    </div>
                </div>
                
                <!-- Enhanced Content -->
                <div class="slds-modal__content modal-content-enhanced">
                    <template if:true={rejectedLeavesList.length}>
                        <div class="table-wrapper-enhanced">
                            <lightning-datatable 
                                key-field="Id" 
                                data={rejectedLeavesList} 
                                columns={reportColumns}
                                hide-checkbox-column
                                class="enhanced-table">
                            </lightning-datatable>
                        </div>
                    </template>
                    <template if:false={rejectedLeavesList.length}>
                        <div class="empty-state-enhanced">
                            <lightning-icon icon-name="utility:check" size="large"></lightning-icon>
                            <h3>No Rejected Leaves</h3>
                            <p>There are no rejected leave requests for this month.</p>
                        </div>
                    </template>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
    <!-- New Hardware Request Modal (HR View) -->
    <template if:true={isHRHardwareRequestModalOpen}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container" style="max-width: 480px;">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={closeHRHwRequestModal}>
                        <lightning-icon icon-name="utility:close" alternative-text="Close" variant="inverse" size="small"></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                    <h2 class="slds-text-heading_medium">New Hardware Request</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-combobox
                        name="employee"
                        label="Select Employee"
                        value={hrHardwareSelectedEmployee}
                        options={employeeOptions}
                        onchange={handleHRHwEmployeeChange}
                        required
                        placeholder="Select Employee...">
                    </lightning-combobox>

                    <lightning-combobox
                        name="hardwareType"
                        label="Hardware Type"
                        value={hrHardwareSelectedType}
                        options={hrHardwareTypeOptions}
                        onchange={handleHRHwTypeChange}
                        required
                        class="slds-m-top_small"
                        placeholder="Select Hardware Type...">
                    </lightning-combobox>

                    <lightning-textarea
                        name="description"
                        label="Reason & Specifications"
                        value={hrHardwareSelectedDescription}
                        onchange={handleHRHwDescriptionChange}
                        class="slds-m-top_small"
                        required
                        placeholder="Enter reason for hardware request...">
                    </lightning-textarea>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={closeHRHwRequestModal}></lightning-button>
                    <lightning-button label="Submit Request" variant="brand" onclick={submitHRHwRequest} disabled={isHRHwSubmitDisabled} class="slds-m-left_x-small"></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- Hardware Detail Modal -->
    <template if:true={isHardwareDetailModalOpen}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container" style="max-width: 600px;">
                <header class="slds-modal__header">
                    <lightning-button-icon class="slds-modal__close" icon-name="utility:close" alternative-text="Close" onclick={closeHardwareDetailModal} variant="bare-inverse" size="large"></lightning-button-icon>
                    <h2 class="slds-text-heading_medium"><strong>Hardware Specifications</strong></h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium" style="background: #f8fafc;">
                    <div class="slds-grid slds-wrap slds-gutters_small">
                        <!-- Image & Primary Info -->
                        <div class="slds-col slds-size_1-of-1 slds-m-bottom_medium slds-grid slds-grid_vertical-align-center">
                            <template if:true={selectedHardwareDetail.Image_URL__c}>
                                <img src={selectedHardwareDetail.Image_URL__c} style="width: 64px; height: 64px; border-radius: 8px; object-fit: cover; border: 1px solid #e2e8f0; margin-right: 16px;">
                            </template>
                            <div>
                                <h3 class="slds-text-heading_small"><strong>{selectedHardwareDetail.Name}</strong></h3>
                                <p class="slds-text-body_small slds-text-color_weak">{selectedHardwareDetail.Type__c} | Serial: {selectedHardwareDetail.Serial_Number__c}</p>
                            </div>
                        </div>

                        <!-- Technical Specs -->
                        <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                            <span class="slds-text-title slds-text-color_weak">Operating System</span>
                            <div class="slds-text-body_regular"><strong>{selectedHardwareDetail.OS__c}</strong></div>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                            <span class="slds-text-title slds-text-color_weak">Location</span>
                            <div class="slds-text-body_regular">{selectedHardwareDetail.Location__c}</div>
                        </div>

                        <!-- Life Span -->
                        <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                            <span class="slds-text-title slds-text-color_weak">Year of Manufacture</span>
                            <div class="slds-text-body_regular">{selectedHardwareDetail.Year_of_Manufacture__c}</div>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                            <span class="slds-text-title slds-text-color_weak">Expected Life Span</span>
                            <div class="slds-text-body_regular">{selectedHardwareDetail.Expected_Life_Span_Years__c} Years</div>
                        </div>

                        <!-- Life Span Usage Progress -->
                        <div class="slds-col slds-size_1-of-1 slds-m-bottom_medium">
                            <div class="slds-grid slds-grid_align-spread slds-m-bottom_xx-small">
                                <span class="slds-text-title slds-text-color_weak">Life Span Consumed</span>
                                <span class={selectedHardwareDetail.lifeUsedBadgeClass}><strong>{selectedHardwareDetail.LifeUsed}</strong></span>
                            </div>
                            <lightning-progress-bar value={selectedHardwareDetail.lifeUsedRaw} size="medium" variant="circular"></lightning-progress-bar>
                        </div>

                        <!-- Connection Credentials (If Laptop/Computer type) -->
                        <template if:true={selectedHardwareDetail.Username__c}>
                            <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                                <span class="slds-text-title slds-text-color_weak">Username</span>
                                <div class="slds-text-body_regular">{selectedHardwareDetail.Username__c}</div>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                                <span class="slds-text-title slds-text-color_weak">Password</span>
                                <div class="slds-text-body_regular">{selectedHardwareDetail.Password__c}</div>
                            </div>
                        </template>

                        <!-- Assignment Date -->
                        <div class="slds-col slds-size_1-of-1 slds-m-bottom_small">
                            <span class="slds-text-title slds-text-color_weak">Assigned Date</span>
                            <div class="slds-text-body_regular">
                                <lightning-formatted-date-time value={selectedHardwareDetail.Date_Assigned__c} year="numeric" month="long" day="2-digit"></lightning-formatted-date-time>
                            </div>
                        </div>

                        <!-- Notes -->
                        <template if:true={selectedHardwareDetail.Notes__c}>
                            <div class="slds-col slds-size_1-of-1">
                                <span class="slds-text-title slds-text-color_weak">Notes & Specifications</span>
                                <div class="slds-text-body_regular slds-p-around_x-small" style="background:#fff; border:1px solid #e2e8f0; border-radius:4px; max-height:80px; overflow-y:auto;">
                                    {selectedHardwareDetail.Notes__c}
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Close" onclick={closeHardwareDetailModal} variant="brand"></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

</template>
