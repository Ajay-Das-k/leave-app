<template>
    <template if:true={isOpen}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_medium">
            <div class="slds-modal__container modal-enhanced">
                <!-- Header -->
                <div class="modal-header-enhanced">
                    <button class="slds-button slds-button_icon modal-close-btn" onclick={handleClose}>
                        <lightning-icon icon-name="utility:close" alternative-text="close" size="small" class="close-icon"></lightning-icon>
                    </button>
                    <div class="modal-header-content">
                        <lightning-icon icon-name="standard:user" size="medium" class="header-icon"></lightning-icon>
                        <div>
                            <h2 class="modal-title">Add New Employee</h2>
                            <p class="modal-subtitle">Create employee record and send welcome email</p>
                        </div>
                    </div>
                </div>

                <!-- Content Form -->
                <div class="slds-modal__content modal-content-enhanced slds-p-around_medium" style="position: relative; min-height: 350px;">
                    <template if:true={showSuccess}>
                        <!-- Confetti Popper Elements -->
                        <div class="confetti-container">
                            <div class="confetti-piece"></div>
                            <div class="confetti-piece"></div>
                            <div class="confetti-piece"></div>
                            <div class="confetti-piece"></div>
                            <div class="confetti-piece"></div>
                            <div class="confetti-piece"></div>
                            <div class="confetti-piece"></div>
                            <div class="confetti-piece"></div>
                            <div class="confetti-piece"></div>
                            <div class="confetti-piece"></div>
                            <div class="confetti-piece"></div>
                            <div class="confetti-piece"></div>
                        </div>

                        <!-- Success Screen -->
                        <div class="success-screen">
                            <div class="checkmark-circle">
                                <div class="checkmark-stem"></div>
                                <div class="checkmark-kick"></div>
                            </div>
                            <h3 class="success-title">Success!</h3>
                            <p class="success-text">{successMessage}</p>
                        </div>
                    </template>

                    <template if:false={showSuccess}>
                        <template if:true={showError}>
                            <div class="error-message slds-m-bottom_medium">
                                {errorMessage}
                            </div>
                        </template>

                        <form onsubmit={handleSubmit}>
                            <!-- Row 1: First Name, Last Name -->
                            <div class="slds-grid slds-wrap slds-gutters">
                                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-m-bottom_small">
                                    <lightning-input label="First Name" value={firstName} onchange={handleChange} name="firstName" required></lightning-input>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-m-bottom_small">
                                    <lightning-input label="Last Name" value={lastName} onchange={handleChange} name="lastName" required></lightning-input>
                                </div>
                            </div>

                            <!-- Row 2: Email, Employee ID -->
                            <div class="slds-grid slds-wrap slds-gutters">
                                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-m-bottom_small">
                                    <lightning-input type="email" label="Email" value={email} onchange={handleChange} name="email" required></lightning-input>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-m-bottom_small">
                                    <lightning-input label="Employee ID" value={employeeId} onchange={handleChange} name="employeeId" placeholder="e.g. CT49" required></lightning-input>
                                </div>
                            </div>

                            <!-- Row 3: Employee Type, Gender -->
                            <div class="slds-grid slds-wrap slds-gutters">
                                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-m-bottom_small">
                                    <lightning-combobox label="Employee Type" value={employeeType} options={employeeTypeOptions} onchange={handleChange} name="employeeType" required></lightning-combobox>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-m-bottom_small">
                                    <lightning-combobox label="Gender" value={gender} options={genderOptions} onchange={handleChange} name="gender" required></lightning-combobox>
                                </div>
                            </div>

                            <!-- Row 4: Department, Joining Date -->
                            <div class="slds-grid slds-wrap slds-gutters">
                                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-m-bottom_small">
                                    <lightning-combobox label="Department" value={department} options={departmentOptions} onchange={handleChange} name="department"></lightning-combobox>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-m-bottom_small">
                                    <lightning-input type="date" label="Joining Date" value={joiningDate} onchange={handleChange} name="joiningDate" required></lightning-input>
                                </div>
                            </div>

                            <!-- Row 5: Mobile Phone, Date of Birth -->
                            <div class="slds-grid slds-wrap slds-gutters">
                                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-m-bottom_small">
                                    <lightning-input type="tel" label="Mobile Number" value={mobile} onchange={handleChange} name="mobile"></lightning-input>
                                </div>
                                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-m-bottom_small">
                                    <lightning-input type="date" label="Date of Birth" value={birthdate} onchange={handleChange} name="birthdate"></lightning-input>
                                </div>
                            </div>

                            <!-- Row 6: Reporting Manager -->
                            <div class="slds-grid slds-wrap slds-gutters slds-m-bottom_small">
                                <div class="slds-col slds-size_1-of-1">
                                    <lightning-combobox label="Reporting Manager" value={managerId} options={managerOptions} onchange={handleChange} name="managerId" placeholder="Select Manager..."></lightning-combobox>
                                </div>
                            </div>

                            <!-- Position Selection (Dual Listbox) -->
                            <div class="slds-grid slds-wrap slds-gutters slds-m-bottom_small">
                                <div class="slds-col slds-size_1-of-1">
                                    <lightning-dual-listbox name="position"
                                                            label="Employee Position(s)"
                                                            source-label="Available Positions"
                                                            selected-label="Selected Positions"
                                                            options={positionOptions}
                                                            value={selectedPositions}
                                                            onchange={handlePositionChange}
                                                            size="4">
                                    </lightning-dual-listbox>
                                </div>
                            </div>

                            <!-- Row 7: Checkboxes for Roles -->
                            <div class="slds-grid slds-wrap slds-gutters slds-m-top_medium">
                                <div class="slds-col slds-size_1-of-3">
                                    <lightning-input type="checkbox" label="Is Manager / Approver?" checked={isManager} onchange={handleCheckboxChange} name="isManager"></lightning-input>
                                </div>
                                <div class="slds-col slds-size_1-of-3">
                                    <lightning-input type="checkbox" label="Is HR Admin?" checked={isHrAdmin} onchange={handleCheckboxChange} name="isHrAdmin"></lightning-input>
                                </div>
                                <div class="slds-col slds-size_1-of-3">
                                    <lightning-input type="checkbox" label="Is Tech System Admin?" checked={isTechnicalSystemAdmin} onchange={handleCheckboxChange} name="isTechnicalSystemAdmin"></lightning-input>
                                </div>
                            </div>

                            <!-- Note about Auto Password -->
                            <div class="password-notice slds-m-top_medium">
                                <lightning-icon icon-name="utility:info" size="x-small" class="slds-m-right_xx-small"></lightning-icon>
                                <span>The initial password will be set automatically to <b>WELCOME@CRMantra12</b> and emailed to the new employee.</span>
                            </div>

                            <!-- Footer Actions -->
                            <div class="slds-m-top_large slds-text-align_right modal-footer">
                                <lightning-button variant="neutral" label="Cancel" onclick={handleClose} class="slds-m-right_small" disabled={isLoading}></lightning-button>
                                <lightning-button variant="brand" type="submit" label="Create Employee" disabled={isLoading} class="submit-btn">
                                    <template if:true={isLoading}>
                                        <span class="spinner"></span> Creating...
                                    </template>
                                </lightning-button>
                            </div>
                        </form>
                    </template>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
