<template>
  <div class="login-container">
    <div class="login-split-card">
      <!-- Left Pane: Form Content -->
      <div class="login-form-pane">
        <div>
          <!-- Logo -->
          <div class="brand-logo-container">
            <img
              src={companyLogoUrl}
              alt="ajayCreation Logo"
              style="
                height: 48px;
                max-width: 100%;
                object-fit: contain;
                display: block;
              "
            />
          </div>

          <!-- LOGIN MODE -->
          <template if:true={isLoginMode}>
            <div class="pane-header">
              <h2>Log in to your Account</h2>
              <p class="sub-text">
                Welcome back! Please enter your details below:
              </p>
            </div>

            <form onsubmit={handleLogin}>
              <div class="input-wrapper">
                <label for="employeeId">Employee ID</label>
                <div class="input-icon-container">
                  <span class="input-icon">
                    <svg
                      viewBox="0 0 24 24"
                      width="16"
                      height="16"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                    >
                      <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"></path>
                      <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                  </span>
                  <input
                    id="employeeId"
                    type="text"
                    value={employeeId}
                    onchange={handleEmployeeIdChange}
                    placeholder="e.g. CT49"
                    required
                  />
                </div>
              </div>

              <div class="input-wrapper">
                <label for="password">Password</label>
                <div class="input-icon-container">
                  <span class="input-icon">
                    <svg
                      viewBox="0 0 24 24"
                      width="16"
                      height="16"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                    >
                      <rect
                        x="3"
                        y="11"
                        width="18"
                        height="11"
                        rx="2"
                        ry="2"
                      ></rect>
                      <path d="M7 11V7a5 5 0 0110 0v4"></path>
                    </svg>
                  </span>
                  <input
                    id="password"
                    type="password"
                    value={password}
                    onchange={handlePasswordChange}
                    placeholder="Enter your password"
                    required
                  />
                </div>
              </div>

              <div class="form-options">
                <label class="checkbox-container">
                  <input type="checkbox" checked />
                  <span class="checkmark"></span>
                  Remember me
                </label>
                <a
                  href="javascript:void(0);"
                  onclick={toggleForgotPassword}
                  class="forgot-link"
                  >Forgot Password?</a
                >
              </div>

              <template if:true={showError}>
                <div class="error-message">{errorMessage}</div>
              </template>

              <button
                type="submit"
                class="login-submit-btn"
                disabled={isLoading}
              >
                <template if:true={isLoading}>
                  <span class="btn-spinner"></span> Logging in...
                </template>
                <template if:false={isLoading}> Log in </template>
              </button>
            </form>
          </template>

          <!-- FORGOT PASSWORD MODE -->
          <template if:true={isForgotPasswordMode}>
            <div class="pane-header">
              <h2>Reset Password</h2>
              <p class="sub-text">
                Enter details to receive an OTP on your email:
              </p>
            </div>

            <form onsubmit={handleResetPassword}>
              <div class="input-wrapper">
                <label>Employee ID</label>
                <div class="input-icon-container">
                  <span class="input-icon">
                    <svg
                      viewBox="0 0 24 24"
                      width="16"
                      height="16"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                    >
                      <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"></path>
                      <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                  </span>
                  <input
                    type="text"
                    data-id="resetEmployeeId"
                    onchange={handleResetEmployeeIdChange}
                    value={resetEmployeeId}
                    placeholder="e.g., CT49"
                    required
                    disabled={otpRequested}
                  />
                </div>
              </div>
              <div class="input-wrapper">
                <label>Email</label>
                <div class="input-icon-container">
                  <span class="input-icon">
                    <svg
                      viewBox="0 0 24 24"
                      width="16"
                      height="16"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                    >
                      <path
                        d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
                      ></path>
                      <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                  </span>
                  <input
                    type="email"
                    data-id="resetEmail"
                    onchange={handleResetEmailChange}
                    value={resetEmail}
                    placeholder="your.email@company.com"
                    required
                    disabled={otpRequested}
                  />
                </div>
              </div>

              <template if:true={resetError}>
                <div class="error-message">{resetErrorMessage}</div>
              </template>
              <template if:true={resetSuccess}>
                <div class="success-message">{resetSuccessMessage}</div>
              </template>

              <template if:false={otpRequested}>
                <button
                  type="button"
                  class="login-submit-btn"
                  onclick={handleRequestOTP}
                  disabled={isLoading}
                >
                  <template if:true={isLoading}>
                    <span class="btn-spinner"></span> Sending OTP...
                  </template>
                  <template if:false={isLoading}>Send OTP</template>
                </button>
              </template>

              <template if:true={otpRequested}>
                <div class="input-wrapper">
                  <label>Enter OTP</label>
                  <input
                    type="text"
                    onchange={handleResetOTPChange}
                    value={resetOTP}
                    placeholder="6-digit OTP"
                    required
                    maxlength="6"
                  />
                </div>
                <div class="input-wrapper">
                  <label>New Password</label>
                  <input
                    type="password"
                    data-id="resetNewPassword"
                    onchange={handleResetNewPasswordChange}
                    value={resetNewPassword}
                    placeholder="Min 8 chars, 1 letter, 1 number"
                    required
                  />
                </div>
                <div class="input-wrapper">
                  <label>Confirm Password</label>
                  <input
                    type="password"
                    data-id="resetConfirmPassword"
                    onchange={handleResetConfirmPasswordChange}
                    value={resetConfirmPassword}
                    placeholder="Confirm new password"
                    required
                  />
                </div>

                <button
                  type="submit"
                  class="login-submit-btn"
                  disabled={isLoading}
                >
                  <template if:true={isLoading}>
                    <span class="btn-spinner"></span> Resetting...
                  </template>
                  <template if:false={isLoading}>Reset Password</template>
                </button>
              </template>
            </form>

            <div class="switch-mode-footer">
              <span
                >Already have an account?
                <a href="javascript:void(0);" onclick={toggleForgotPassword}
                  >Back to Login</a
                ></span
              >
            </div>
          </template>

          <!-- FORCED PASSWORD RESET MODE -->
          <template if:true={isForcePasswordChange}>
            <div class="pane-header">
              <h2>Welcome!</h2>
              <p class="sub-text">
                Please change your default password to continue.
              </p>
            </div>

            <form onsubmit={handleChangeDefaultPassword}>
              <div class="input-wrapper">
                <label>New Password</label>
                <input
                  type="password"
                  data-id="forceNewPassword"
                  onchange={handleForceNewPasswordChange}
                  value={forceNewPassword}
                  placeholder="Min 8 chars, 1 letter, 1 number"
                  required
                />
              </div>
              <div class="input-wrapper">
                <label>Confirm Password</label>
                <input
                  type="password"
                  data-id="forceConfirmPassword"
                  onchange={handleForceConfirmPasswordChange}
                  value={forceConfirmPassword}
                  placeholder="Confirm new password"
                  required
                />
              </div>

              <template if:true={forceError}>
                <div class="error-message">{forceErrorMessage}</div>
              </template>
              <template if:true={forceSuccess}>
                <div class="success-message">{forceSuccessMessage}</div>
              </template>

              <button
                type="submit"
                class="login-submit-btn"
                disabled={isLoading}
              >
                <template if:true={isLoading}>
                  <span class="btn-spinner"></span> Updating...
                </template>
                <template if:false={isLoading}>Change Password</template>
              </button>
            </form>
          </template>

          <!-- SIGNUP MODE -->
          <template if:true={isSignupMode}>
            <div class="pane-header">
              <h2>Create an Account</h2>
              <p class="sub-text">Fill in your details below to sign up:</p>
            </div>

            <form onsubmit={handleSignup} class="signup-scrollable-form">
              <div class="form-row">
                <div class="input-wrapper">
                  <label for="firstName">First Name</label>
                  <input
                    id="firstName"
                    type="text"
                    value={firstName}
                    onchange={handleFirstNameChange}
                    placeholder="First name"
                    required
                  />
                </div>
                <div class="input-wrapper">
                  <label for="lastName">Last Name</label>
                  <input
                    id="lastName"
                    type="text"
                    value={lastName}
                    onchange={handleLastNameChange}
                    placeholder="Last name"
                    required
                  />
                </div>
              </div>

              <div class="input-wrapper">
                <label for="signupEmail">Email</label>
                <input
                  id="signupEmail"
                  type="email"
                  value={email}
                  onchange={handleEmailChange}
                  placeholder="your.email@company.com"
                  required
                />
              </div>

              <div class="input-wrapper">
                <label for="signupEmployeeId">Employee ID</label>
                <input
                  id="signupEmployeeId"
                  type="text"
                  value={employeeId}
                  onchange={handleSignupEmployeeIdChange}
                  placeholder="e.g., CT49"
                  required
                />
              </div>

              <div class="form-row">
                <div class="input-wrapper">
                  <label for="department">Department</label>
                  <select
                    id="department"
                    value={department}
                    onchange={handleDepartmentChange}
                  >
                    <option value="">--Select--</option>
                    <option value="Ad-Sales in a Box">Ad-Sales in a Box</option>
                    <option value="TDS">TDS</option>
                    <option value="AI">AI</option>
                  </select>
                </div>
                <div class="input-wrapper">
                  <label for="employeeType">Employee Type</label>
                  <select
                    id="employeeType"
                    value={employeeType}
                    onchange={handleEmployeeTypeChange}
                    required
                  >
                    <option value="">--Select--</option>
                    <option value="Permanent">Permanent</option>
                    <option value="Probation">Probation</option>
                  </select>
                </div>
              </div>

              <div class="form-row">
                <div class="input-wrapper">
                  <label for="gender">Gender</label>
                  <select
                    id="gender"
                    value={gender}
                    onchange={handleGenderChange}
                    required
                  >
                    <option value="">--Select--</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                  </select>
                </div>
                <div class="input-wrapper">
                  <label for="mobile">Mobile Number</label>
                  <input
                    id="mobile"
                    type="tel"
                    value={mobile}
                    onchange={handleMobileChange}
                    placeholder="Mobile number"
                  />
                </div>
              </div>

              <div class="form-row">
                <div class="input-wrapper">
                  <label for="birthdate">Date of Birth</label>
                  <input
                    id="birthdate"
                    type="date"
                    value={birthdate}
                    onchange={handleBirthdateChange}
                  />
                </div>
                <div class="input-wrapper">
                  <label for="joiningDate">Joining Date</label>
                  <input
                    id="joiningDate"
                    type="date"
                    value={joiningDate}
                    onchange={handleJoiningDateChange}
                    required
                  />
                </div>
              </div>

              <div class="form-row">
                <div class="input-wrapper">
                  <label for="workLocation">Work Location</label>
                  <select
                    id="workLocation"
                    value={workLocation}
                    onchange={handleWorkLocationChange}
                    required
                  >
                    <option value="">--Select--</option>
                    <option value="Home">Home</option>
                    <option value="Office">Office</option>
                  </select>
                </div>
                <div class="input-wrapper">
                  <label for="profilePic">Profile Picture</label>
                  <input
                    id="profilePic"
                    type="file"
                    accept="image/*"
                    onchange={handleProfilePicSelect}
                  />
                </div>
              </div>

              <template if:true={showCropper}>
                <div class="cropper-container">
                  <p class="cropper-tip">
                    Drag image to pan. Use slider to zoom.
                  </p>
                  <div class="cropper-wrapper">
                    <canvas
                      class="crop-canvas"
                      width="150"
                      height="150"
                      lwc:dom="manual"
                      onmousedown={handleCropDragStart}
                      onmousemove={handleCropDragMove}
                      onmouseup={handleCropDragEnd}
                      onmouseleave={handleCropDragEnd}
                      ontouchstart={handleCropDragStart}
                      ontouchmove={handleCropDragMove}
                      ontouchend={handleCropDragEnd}
                    >
                    </canvas>
                  </div>
                  <div class="cropper-zoom">
                    <label>Zoom:</label>
                    <input
                      type="range"
                      min="1"
                      max="3"
                      step="0.1"
                      value={cropScale}
                      oninput={handleCropScale}
                    />
                  </div>
                  <button
                    type="button"
                    class="btn-confirm-crop"
                    onclick={applyCrop}
                  >
                    Confirm Crop
                  </button>
                </div>
              </template>

              <template if:true={croppedImageBase64}>
                <div class="cropped-preview-container">
                  <p class="cropped-success">✓ Profile Picture Ready</p>
                  <img src={croppedImageBase64} class="cropped-preview-img" />
                  <br />
                  <button
                    type="button"
                    class="btn-remove-pic"
                    onclick={removeProfilePic}
                  >
                    Remove
                  </button>
                </div>
              </template>

              <div class="form-row">
                <div class="input-wrapper">
                  <label for="signupPassword">Password</label>
                  <input
                    id="signupPassword"
                    type="password"
                    value={signupPassword}
                    onchange={handleSignupPasswordChange}
                    placeholder="Min 6 characters"
                    required
                  />
                </div>
                <div class="input-wrapper">
                  <label for="confirmPassword">Confirm Password</label>
                  <input
                    id="confirmPassword"
                    type="password"
                    value={confirmPassword}
                    onchange={handleConfirmPasswordChange}
                    placeholder="Confirm password"
                    required
                  />
                </div>
              </div>

              <template if:true={signupError}>
                <div class="error-message">{signupErrorMessage}</div>
              </template>

              <template if:true={signupSuccess}>
                <div class="success-message">{signupSuccessMessage}</div>
              </template>

              <button
                type="submit"
                class="login-submit-btn"
                disabled={isLoading}
              >
                <template if:true={isLoading}>
                  <span class="btn-spinner"></span> Creating Account...
                </template>
                <template if:false={isLoading}> Create Account </template>
              </button>
            </form>

            <div class="switch-mode-footer">
              <span
                >Already have an account?
                <a href="javascript:void(0);" onclick={toggleMode}
                  >Login here</a
                ></span
              >
            </div>
          </template>
        </div>

        <!-- Footer text inside form pane -->
        <div class="form-pane-footer">
          <p>For assistance, contact HR Support</p>
        </div>
      </div>

      <!-- Right Pane: Red Theme Illustration & Corporate Background Image -->
      <div class="login-illustration-pane">
        <div class="illustration-image-overlay"></div>
        <div class="illustration-content">
          <div class="illustration-graphics">
            <!-- Dotwork style hub network graphic -->
            <div class="dots-network-wrapper">
              <div class="hub-icon red-pulse">
                <svg
                  viewBox="0 0 24 24"
                  width="32"
                  height="32"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                >
                  <rect x="3" y="3" width="18" height="18" rx="4"></rect>
                  <circle cx="9" cy="9" r="1.5" fill="currentColor"></circle>
                  <circle cx="15" cy="15" r="1.5" fill="currentColor"></circle>
                </svg>
              </div>

              <!-- Connecting lines -->
              <div class="connector-line line-1"></div>
              <div class="connector-line line-2"></div>
              <div class="connector-line line-3"></div>

              <!-- Small connection circles representing integration -->
              <div class="app-dot dot-top">
                <svg
                  viewBox="0 0 24 24"
                  width="16"
                  height="16"
                  fill="currentColor"
                >
                  <path
                    d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"
                  />
                </svg>
              </div>
              <div class="app-dot dot-mid">
                <svg
                  viewBox="0 0 24 24"
                  width="16"
                  height="16"
                  fill="currentColor"
                >
                  <path
                    d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
                  />
                </svg>
              </div>
              <div class="app-dot dot-bottom">
                <svg
                  viewBox="0 0 24 24"
                  width="16"
                  height="16"
                  fill="currentColor"
                >
                  <path
                    d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"
                  />
                </svg>
              </div>

              <!-- Mockup dashboard window overlay -->
              <div class="mock-window">
                <div class="window-bar">
                  <span class="win-dot red"></span>
                  <span class="win-dot yellow"></span>
                  <span class="win-dot green"></span>
                </div>
                <div class="window-body">
                  <div class="mock-row">
                    <div class="mock-avatar"></div>
                    <div class="mock-lines">
                      <div class="mock-line-long"></div>
                      <div class="mock-line-short"></div>
                    </div>
                  </div>
                  <div class="mock-row">
                    <div class="mock-avatar"></div>
                    <div class="mock-lines">
                      <div class="mock-line-long"></div>
                      <div class="mock-line-short"></div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="illustration-text">
            <h3>Connect with every employee.</h3>
            <p>
              Everything you need in an easily customizable leave management
              dashboard.
            </p>
          </div>

          <!-- Slide Indicator Dots -->
          <div class="indicator-dots">
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </div>
        </div>
      </div>
    </div>
  </div>
</template>
